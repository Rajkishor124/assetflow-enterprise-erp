spring:
  profiles:
    active: @spring.profiles.active@
    group:
      local: local
      dev: dev
      prod: prod
  application:
    name: assetflow-backend

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

assetflow:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-12345678901234567890123456789012}
      expiration-ms: 900000 # 15 minutes
      refresh-expiration-ms: 604800000 # 7 days
